<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
</head>
<style>
     *{
          padding: 0;
          margin: 0;
          box-sizing: border-box;
     }
     body,html{
          height: 100%;
          width: 100%;
     }
     .main{
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100%;
          width: 100%;
          /* background-color: red; */
     }
     .cer{
          height: 80%;
          width: 80%;
          background-color: aqua;
     }
     .cer img{
          pointer-events: none;
          height: 100%;
          width: 100%;
     }
     .add{
          text-transform: uppercase;
          display: flex;
          align-items: center;
          justify-content: center;
          position: absolute;
          left: 50%;
          top: 37%;
          transform: translate(-50%,-50%);
          height: 3vw;
          width: 30vw;
          background-color: rgb(255, 255, 255);
     }
     .add h1{
          color: green;
     }
</style>
<body>
     <div class="main">
          <div class="cer">
               <div class="add">
                    <h1>Sartaj Husain</h1>
               </div>
               <img src="/WhatsApp Image 2023-04-15 at 1.58.21 PM.jpeg" alt="">
          </div>
     </div>
</body>
</html>
